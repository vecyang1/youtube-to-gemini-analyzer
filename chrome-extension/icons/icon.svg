<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gemini" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#34a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbc04;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- YouTube play button (left side) -->
  <g transform="translate(28, 44)">
    <rect width="36" height="28" rx="4" fill="#FF0000"/>
    <path d="M14 8L24 14L14 20V8Z" fill="white"/>
  </g>

  <!-- Arrow indicating flow -->
  <path d="M52 58L60 58L56 54M60 58L56 62" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Gemini sparkle/star (right side) -->
  <g transform="translate(68, 44)">
    <!-- Main star shape -->
    <path d="M18 4L20 12L28 14L20 16L18 24L16 16L8 14L16 12Z" fill="url(#gemini)"/>
    <!-- Small accent stars -->
    <circle cx="6" cy="6" r="2" fill="#fbbc04" opacity="0.8"/>
    <circle cx="30" cy="8" r="1.5" fill="#34a853" opacity="0.8"/>
    <circle cx="28" cy="22" r="1.5" fill="#4285f4" opacity="0.8"/>
  </g>

  <!-- Bottom accent text -->
  <text x="64" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle" opacity="0.95">AI ANALYZE</text>
</svg>
